# andon.yml - el muro server-side de Jidoka: porta el Andon (la ley
# tools/blast-radius.json, tools/verificar.ps1) a un check de PR. El hook local
# pre-push se salta con --no-verify; este check no (disparo no-verify-es-teatro:
# el muro real es el required check server-side). Para que bloquee de verdad, un
# humano debe marcarlo como required check en la branch protection de main
# (require PR + check requerido + sin bypass de admins; ver andon/README.md).
#
# El juez no viaja en el PR: el veredicto lo da el verificador y la ley de la
# rama BASE (un PR no puede editar la ley que lo juzga; ADR 0003). Los cambios
# legitimos a la ley rigen a partir del siguiente PR. La prueba de humo si corre
# sobre el motor del PR: valida el motor nuevo que el PR propone.
name: andon

on:
  pull_request:

permissions:
  contents: read

jobs:
  andon:
    name: andon blast-radius (la ley)
    # windows-latest a proposito: shell 'powershell' es PS 5.1, el mismo interprete
    # del gate local (el gate corre identico en el hook pre-push y aqui).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # El gate evalua el rango base...HEAD del PR; necesita la historia completa.
          fetch-depth: 0

      - name: prueba de humo de los gates (quien valida tambien se valida)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          .\tools\probar-gate.ps1;     if ($LASTEXITCODE -ne 0) { exit 1 }
          .\tools\probar-hooks.ps1;    if ($LASTEXITCODE -ne 0) { exit 1 }
          .\tools\probar-auditor.ps1;  if ($LASTEXITCODE -ne 0) { exit 1 }
          .\tools\probar-disparos.ps1; if ($LASTEXITCODE -ne 0) { exit 1 }
          .\tools\probar-preflight.ps1; if ($LASTEXITCODE -ne 0) { exit 1 }
          .\tools\probar-docs.ps1;     if ($LASTEXITCODE -ne 0) { exit 1 }
          # Self-tests Jidoka-only (no sembrados): corren solo si estan presentes
          # (un hijo instalado no los tiene, y este mismo workflow se siembra).
          # probar-instalador y probar-sembrar corren AQUI a proposito: en Windows
          # endurecido con AV (Bitdefender CMD:Heur, familia ransomware) instalar.ps1 y
          # probar-instalador.ps1 caen en cuarentena y el preflight local no puede
          # correrlos; el CI no tiene ese AV, asi que es donde el smoke del instalador
          # y del camino AV-seguro (sembrar-manual) si corre (ADR 0027 enmienda).
          foreach ($jt in 'probar-instalador','probar-sembrar','probar-version','probar-publicar','probar-agentes') {
            if (Test-Path ".\tools\$jt.ps1") { & ".\tools\$jt.ps1"; if ($LASTEXITCODE -ne 0) { exit 1 } }
          }
          exit 0

      - name: andon sobre el rango del PR (ley y verificador de la BASE)
        shell: powershell
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          $ErrorActionPreference = 'Continue'
          $ref = "origin/$env:BASE_REF"
          git cat-file -e "${ref}:tools/verificar.ps1"; $okVeri = ($LASTEXITCODE -eq 0)
          git cat-file -e "${ref}:tools/blast-radius.json"; $okLey = ($LASTEXITCODE -eq 0)
          if ($okVeri -and $okLey) {
            $veriBase = Join-Path $env:TEMP 'verificar-base.ps1'
            $leyBase  = Join-Path $env:TEMP 'blast-radius-base.json'
            git show "${ref}:tools/verificar.ps1"     | Out-File $veriBase -Encoding ascii
            git show "${ref}:tools/blast-radius.json" | Out-File $leyBase  -Encoding ascii
            $out = (& $veriBase -Base $ref -Manifiesto $leyBase -Repo "$env:GITHUB_WORKSPACE" 6>&1 | Out-String)
          } else {
            Write-Host "##[warning] La base $ref aun no trae el motor Andon; fallback al motor del PR (solo valido en el PR fundacional)."
            $out = (.\tools\verificar.ps1 -Base $ref 6>&1 | Out-String)
          }
          $code = $LASTEXITCODE
          Write-Host $out
          # Grieta 1 (auditoria externa): los avisos ya no viven solo en el log.
          # Suben a la superficie del PR (job summary) para que un aviso ignorado
          # deje de ser invisible en un check verde.
          $hallazgos = @($out -split "`r?`n" | Where-Object { $_ -match '\[(AVISO|BLOQUEA)\]' })
          "## Andon - blast-radius (rango del PR)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          if ($hallazgos.Count -gt 0) {
            foreach ($h in $hallazgos) { "- " + $h.Trim() | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8 }
          } else {
            "Sin hallazgos: blast-radius al dia." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }
          exit $code

      # Conformidad estructural de los documentos gobernados (capa-2) - MURO OPT-IN.
      # estado-docs.ps1 -Estricto sale 1 SOLO si un doc marcado 'estricto:true' en el
      # ledger tools/docs-gobernados.json perdio una seccion requerida. Nace APAGADO:
      # todos los docs nacen estricto:false, asi que este step es verde por defecto
      # (el aviso vive en /jidoka:arranca). El cliente enciende el "no se pueda"
      # flipando estricto:true en su ledger -- la palanca es suya, no impuesta (ADR 0042).
      - name: conformidad estructural de docs gobernados (muro opt-in, capa-2)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          if (Test-Path '.\tools\estado-docs.ps1') {
            .\tools\estado-docs.ps1 -Estricto
            if ($LASTEXITCODE -ne 0) {
              "## Andon - conformidad estructural (docs gobernados)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
              "- Un documento gobernado ESTRICTO altero su estructura: garantia nula. Restaura las secciones requeridas o revierte estricto:true en tools/docs-gobernados.json." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
              exit 1
            }
          }
          exit 0

      # Costura .local del CI (cosecha #7, issue #90): los checks PROPIOS del hijo
      # viven en tools/ci.local.ps1 (instancia), no editados dentro de este workflow.
      # Asi andon.yml queda pristino y -Actualizar no marca DIVERGE en cada bajada --
      # el mismo patron que la costura tools/verificar.local.ps1 del verificador.
      - name: extension local del CI (tools/ci.local.ps1, si existe)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          if (Test-Path '.\tools\ci.local.ps1') {
            Write-Host "== Extension local del CI (tools/ci.local.ps1) =="
            .\tools\ci.local.ps1
            exit $LASTEXITCODE
          }
          Write-Host "(sin extension local: tools/ci.local.ps1 no existe -- nada que correr)"
          exit 0

      - name: auditor del grafo de docs (product/) sobre el rango del PR
        shell: powershell
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          $ErrorActionPreference = 'Continue'
          $ref = "origin/$env:BASE_REF"
          $rango = "$ref...HEAD"
          git cat-file -e "${ref}:tools/auditar.ps1"; $okAud = ($LASTEXITCODE -eq 0)
          if ($okAud) {
            $audBase = Join-Path $env:TEMP 'auditar-base.ps1'
            git show "${ref}:tools/auditar.ps1" | Out-File $audBase -Encoding ascii
            $out = (& $audBase -Range $rango -Bloquea -Repo "$env:GITHUB_WORKSPACE" 6>&1 | Out-String)
          } else {
            Write-Host "##[warning] La base $ref aun no trae el auditor del grafo; fallback al del PR (PR fundacional)."
            $out = (.\tools\auditar.ps1 -Range $rango -Bloquea 6>&1 | Out-String)
          }
          $code = $LASTEXITCODE
          Write-Host $out
          $hallazgos = @($out -split "`r?`n" | Where-Object { $_ -match '\[(AVISO|BLOQUEA)\]' })
          "## Andon - auditor del grafo (product/)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          if ($hallazgos.Count -gt 0) {
            foreach ($h in $hallazgos) { "- " + $h.Trim() | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8 }
          } else {
            "Sin hallazgos: grafo integro." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }
          exit $code
